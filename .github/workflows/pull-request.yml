name: Pull Request
on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  NODE_ENV: production
  WRANGLER_SEND_METRICS: false

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  deploy-preview:
    name: Deploy Preview (${{ matrix.app }})
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: payments
          - app: paymentauth-base
          - app: paymentauth-basic
          - app: paymentauth-tetris
          - app: paymentauth-x402
          - app: purl
          - app: reth-snapshots
          - app: presto
    env:
      NODE_ENV: production
    steps:
      - name: Clone repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for relevant changes
        id: changes
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -qE "^(apps/${{ matrix.app }}/|packages/|pnpm-lock.yaml)"; then
            echo "relevant=true" >> $GITHUB_OUTPUT
          else
            echo "relevant=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.changes.outputs.relevant == 'true'
        uses: ./.github/actions/install-dependencies

      - name: Build
        if: steps.changes.outputs.relevant == 'true'
        run: pnpm build

      - name: Upload Preview Version
        if: steps.changes.outputs.relevant == 'true'
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/${{ matrix.app }}
          packageManager: pnpm
          # versions upload creates a preview without affecting production
          # deploy would activate the version and update production
          command: ${{ matrix.deploy_cmd || 'versions upload' }}

      - name: Save Deployment Info
        if: always()
        shell: bash
        run: |
          mkdir -p deployment-info

          if [[ "${{ steps.changes.outputs.relevant }}" != "true" ]]; then
            STATUS="skipped"
            DEPLOYMENT_URL=""
          elif [[ "${{ steps.deploy.outcome }}" == "success" ]]; then
            STATUS="success"
            # Use wrangler's deployment-url output (includes version preview URL)
            DEPLOYMENT_URL="${{ steps.deploy.outputs.deployment-url }}"
            # Fallback to pages alias URL for Pages deployments
            if [[ -z "$DEPLOYMENT_URL" && -n "${{ steps.deploy.outputs.pages-deployment-alias-url }}" ]]; then
              DEPLOYMENT_URL="${{ steps.deploy.outputs.pages-deployment-alias-url }}"
            fi
          else
            STATUS="failed"
            DEPLOYMENT_URL=""
          fi

          FILENAME="deployment-info/${{ matrix.app }}.json"
          cat > "$FILENAME" << EOF
          {
            "app": "${{ matrix.app }}",
            "status": "$STATUS",
            "deployment_url": "$DEPLOYMENT_URL"
          }
          EOF

          cat "$FILENAME"

      - name: Upload Deployment Info
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: deployment-${{ matrix.app }}
          path: deployment-info/${{ matrix.app }}.json
          retention-days: 1

  comment-deployments:
    name: Post Deployment Table
    runs-on: ubuntu-latest
    needs: deploy-preview
    if: always()
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download All Deployment Artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: deployment-*
          path: deployments
          merge-multiple: true

      - name: Post Deployment Table
        uses: ./.github/actions/post-deployment-table
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deployments-path: deployments
