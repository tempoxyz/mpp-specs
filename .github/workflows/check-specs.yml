name: Check Specs

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ietf-spec-tools .

      - name: Build and validate specs
        run: docker run --rm -v "$PWD":/data ietf-spec-tools /data/scripts/check.sh

      - name: Check for uncommitted changes
        run: |
          if [ -n "$(git status --porcelain artifacts/*.xml)" ]; then
            echo "Generated docs are out of date. Please run 'make build' and commit."
            git diff --stat artifacts/*.xml
            exit 1
          fi
          echo "All docs are up to date."
