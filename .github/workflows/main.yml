name: Main
on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: production
  WRANGLER_SEND_METRICS: false

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  deploy:
    name: Deploy (${{ matrix.app }}${{ matrix.env && format('-{0}', matrix.env) || '' }})
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix:
        include:
          # All apps deploy to both moderato (testnet) and presto (production)
          - app: payments-proxy
            env: moderato
          - app: payments-proxy
            env: presto
          - app: paymentauth-base
            env: moderato
          - app: paymentauth-base
            env: presto
          - app: paymentauth-basic
            env: moderato
          - app: paymentauth-basic
            env: presto
          - app: paymentauth-tetris
            env: moderato
          - app: paymentauth-tetris
            env: presto
          - app: paymentauth-x402
            env: moderato
          - app: paymentauth-x402
            env: presto
          - app: reth-snapshots
            env: moderato
          - app: reth-snapshots
            env: presto

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for relevant changes
        id: changes
        run: |
          if [[ ${{ github.event_name }} == 'workflow_dispatch' ]]; then
            echo "relevant=true" >> $GITHUB_OUTPUT
          elif git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -qE "^(apps/${{ matrix.app }}/|packages/|pnpm-lock.yaml)"; then
            echo "relevant=true" >> $GITHUB_OUTPUT
          else
            echo "relevant=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.changes.outputs.relevant == 'true'
        uses: ./.github/actions/install-dependencies

      - name: Build
        if: steps.changes.outputs.relevant == 'true'
        run: pnpm build

      - name: Deploy Workers
        if: steps.changes.outputs.relevant == 'true'
        uses: cloudflare/wrangler-action@v3
        env:
          NODE_ENV: production
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/${{ matrix.app }}
          packageManager: pnpm
          command: deploy ${{ matrix.env && format('--env {0}', matrix.env) || '' }}
