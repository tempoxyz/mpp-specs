name: Main
on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: production
  WRANGLER_SEND_METRICS: false

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  deploy:
    name: Deploy (${{ matrix.app }}${{ matrix.env && format('-{0}', matrix.env) || '' }})
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix:
        include:
          # All apps deploy to testnet, moderato, and mainnet
          - app: payments-proxy
            env: testnet
          - app: payments-proxy
            env: moderato
          - app: payments-proxy
            env: mainnet
          - app: paymentauth-base
            env: testnet
          - app: paymentauth-base
            env: moderato
          - app: paymentauth-base
            env: mainnet
          - app: paymentauth-basic
            env: testnet
          - app: paymentauth-basic
            env: moderato
          - app: paymentauth-basic
            env: mainnet
          - app: paymentauth-tetris
            env: testnet
          - app: paymentauth-tetris
            env: moderato
          - app: paymentauth-tetris
            env: mainnet
          - app: paymentauth-x402
            env: testnet
          - app: paymentauth-x402
            env: moderato
          - app: paymentauth-x402
            env: mainnet
          - app: reth-snapshots
            env: testnet
          - app: reth-snapshots
            env: moderato
          - app: reth-snapshots
            env: mainnet
          - app: presto-auth
            env: testnet
            build_wheel: true
          - app: presto-auth
            env: moderato
            build_wheel: true
          - app: presto-auth
            env: mainnet
            build_wheel: true

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for relevant changes
        id: changes
        run: |
          if [[ ${{ github.event_name }} == 'workflow_dispatch' ]]; then
            echo "relevant=true" >> $GITHUB_OUTPUT
          elif git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -qE "^(apps/${{ matrix.app }}/|packages/|pnpm-lock.yaml)"; then
            echo "relevant=true" >> $GITHUB_OUTPUT
          else
            echo "relevant=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.changes.outputs.relevant == 'true'
        uses: ./.github/actions/install-dependencies

      - name: Build
        if: steps.changes.outputs.relevant == 'true'
        run: pnpm build

      - name: Build presto wheel
        if: steps.changes.outputs.relevant == 'true' && matrix.build_wheel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Install uv
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          
          # Clone presto (private repo) using GitHub token
          git clone --depth 1 https://x-access-token:${GH_TOKEN}@github.com/tempoxyz/presto.git /tmp/presto
          cd /tmp/presto
          uv build
          
          # Copy wheel to presto-auth public directory
          mkdir -p ${{ github.workspace }}/apps/presto-auth/public
          cp dist/*.whl ${{ github.workspace }}/apps/presto-auth/public/
          cp dist/*.tar.gz ${{ github.workspace }}/apps/presto-auth/public/
          
          # Show what was built
          ls -la ${{ github.workspace }}/apps/presto-auth/public/

      - name: Deploy Workers
        if: steps.changes.outputs.relevant == 'true'
        uses: cloudflare/wrangler-action@v3
        env:
          NODE_ENV: production
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/${{ matrix.app }}
          packageManager: pnpm
          command: deploy ${{ matrix.env && format('--env {0}', matrix.env) || '' }}
