name: Main
on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: production
  WRANGLER_SEND_METRICS: false

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  deploy:
    name: Deploy (${{ matrix.app }})
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: payments
          - app: paymentauth-base
          - app: paymentauth-basic
          - app: paymentauth-tetris
          - app: paymentauth-x402
          - app: purl
          - app: reth-snapshots
          - app: presto
            build_wheel: true

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies

      - name: Build
        run: pnpm build

      - name: Build presto wheel
        if: matrix.build_wheel
        env:
          GH_TOKEN: ${{ secrets.PRESTO_CLONE_TOKEN }}
        run: |
          # Install uv
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"

          # Clone presto (private repo) using GitHub token
          git clone --depth 1 https://x-access-token:${GH_TOKEN}@github.com/tempoxyz/presto.git /tmp/presto
          cd /tmp/presto
          uv build

          # Copy wheel to presto public directory
          mkdir -p ${{ github.workspace }}/apps/presto/public
          cp dist/*.whl ${{ github.workspace }}/apps/presto/public/
          cp dist/*.tar.gz ${{ github.workspace }}/apps/presto/public/

          # Show what was built
          ls -la ${{ github.workspace }}/apps/presto/public/

      - name: Deploy Workers
        uses: cloudflare/wrangler-action@v3
        env:
          NODE_ENV: production
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/${{ matrix.app }}
          packageManager: pnpm
          command: deploy
