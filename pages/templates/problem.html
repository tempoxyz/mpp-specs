<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☰</text></svg>">
  <title>{{ title }} – Payment Auth Problem Type</title>
  <style>
    @font-face {
      font-family: "Berkeley Mono";
      src: url("{{ fonts_prefix }}fonts/BerkeleyMono-Regular.woff2") format("woff2");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Berkeley Mono";
      src: url("{{ fonts_prefix }}fonts/BerkeleyMono-Bold.woff2") format("woff2");
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --color-link: #0066cc;
      --color-text: #333;
    }

    body {
      font-family: "Berkeley Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 16px;
      max-width: 900px;
      margin: 2rem auto;
      padding: 0 1rem;
      line-height: 1.6;
      color: var(--color-text);
      -webkit-font-smoothing: antialiased;
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 0.25rem;
    }

    .breadcrumb {
      font-size: 0.8rem;
      margin-bottom: 1.5rem;
    }

    .breadcrumb a {
      color: var(--color-link);
      text-decoration: none;
    }

    .breadcrumb a:hover {
      text-decoration: underline;
    }

    .sep {
      color: #999;
      margin: 0 0.25rem;
    }

    table {
      border-collapse: collapse;
      margin: 1.5rem 0;
      font-size: 0.9rem;
    }

    th, td {
      text-align: left;
      padding: 0.4rem 1rem 0.4rem 0;
      vertical-align: top;
    }

    th {
      font-weight: 700;
      border-bottom: 2px solid var(--color-text);
    }

    td {
      border-bottom: 1px solid #ddd;
    }

    .type-uri {
      font-size: 0.85rem;
      word-break: break-all;
    }

    .description {
      margin: 1.5rem 0;
      line-height: 1.7;
    }

    .example {
      background: #f6f6f6;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 1rem;
      overflow-x: auto;
      font-size: 0.8rem;
      line-height: 1.5;
    }

    .example-label {
      font-weight: 700;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
      color: #666;
    }

    a {
      color: var(--color-link);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .back {
      margin-top: 2rem;
      font-size: 0.85rem;
    }

    @media (max-width: 600px) {
      th, td {
        padding-right: 0.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="breadcrumb">
    <a href="{{ root_prefix }}">Specs</a><span class="sep">/</span><a href="{{ problems_prefix }}">problems</a><span class="sep">/</span>{{ slug }}
  </div>

  <h1>{{ title }}</h1>

  <table>
    <tr><th>Field</th><th>Value</th></tr>
    <tr><td>Type URI</td><td class="type-uri"><code>{{ type_uri }}</code></td></tr>
    <tr><td>HTTP Status</td><td><code>{{ http_status }}</code></td></tr>
    <tr><td>Defined In</td><td><a href="{{ root_prefix }}/{{ spec_label }}-00.html">{{ spec_label }}</a></td></tr>
  </table>

  <div class="description">{{ description }}</div>

  <div class="example-label">Example Response</div>
  <pre class="example">{{ example }}</pre>

  <div class="back"><a href="{{ problems_prefix }}">← All problem types</a></div>
</body>
</html>
