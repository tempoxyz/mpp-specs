[profile.default]
src = "contracts"
test = "test"
out = "out"
libs = ["lib"]
solc = "0.8.20"
optimizer = true
optimizer_runs = 200

[invariant]
runs = 256
depth = 50
fail_on_revert = false
shrink_run_limit = 1000

[fuzz]
runs = 256
max_test_rejects = 65536

[rpc_endpoints]
moderato = "https://rpc.moderato.tempo.xyz"

[etherscan]
moderato = { key = "", url = "https://explorer.moderato.tempo.xyz/api" }
